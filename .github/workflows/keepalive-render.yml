name: Keep Render Awake

# Free tier spins down after ~15min idle. Ping /health every 5 min.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keepalive-render
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render health
        run: |
          set +e
          URL="https://auto-recorder-1w7r.onrender.com/health"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /tmp/h.txt -w "%{http_code}" --max-time 60 "$URL")
            BODY=$(head -c 80 /tmp/h.txt 2>/dev/null)
            echo "try=$i http=$CODE body=$BODY"
            if [ "$CODE" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "WARN: health not 200 after retries (cold start may still be waking)"
          exit 0
