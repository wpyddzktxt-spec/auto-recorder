name: Record JustKatrin
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

concurrency:
  group: record-jk
  cancel-in-progress: false

permissions:
  actions: write

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  record:
    runs-on: ubuntu-22.04
    timeout-minutes: 14
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq ffmpeg 2>&1 | tail -2
          pip3 install --quiet --upgrade streamlink 2>&1 | tail -1

      - name: Check & Record JustKatrin
        id: rec
        run: |
          # Check if live with actual segments
          DATA=$(curl -s --max-time 8 "https://go.xxxiijmp.com/api/models?modelsList=JustKatrin&strict=1" 2>/dev/null || echo '{"count":0}')
          COUNT=$(echo "$DATA" | jq -r '.count // 0' 2>/dev/null)

          if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
            echo "[$(date -u +%H:%M:%S)] Not live"
            echo "live=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          HLS=$(echo "$DATA" | jq -r '.models[0].stream.url // ""' 2>/dev/null)
          VIEWERS=$(echo "$DATA" | jq -r '.models[0].viewersCount // 0' 2>/dev/null)

          if [ -z "$HLS" ] || [ "$HLS" = "null" ]; then
            echo "No HLS"
            echo "live=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # v6.36: Verify HLS has actual video segments
          PLAYLIST=$(curl -s --max-time 8 "$HLS" 2>/dev/null || echo "")
          SEGS=$(echo "$PLAYLIST" | grep -c '#EXTINF' 2>/dev/null || echo 0)
          if [ "$SEGS" -eq 0 ]; then
            echo "HLS empty (0 segments)"
            echo "live=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "[$(date -u +%H:%M:%S)] LIVE! viewers=$VIEWERS segs=$SEGS"
          echo "live=true" >> $GITHUB_OUTPUT
          echo "hls=$HLS" >> $GITHUB_OUTPUT
          echo "viewers=$VIEWERS" >> $GITHUB_OUTPUT

          # Record 10-min chunk (with -t for explicit duration)
          OUTFILE="/tmp/jk_$(date +%s).mp4"
          echo "Recording 10min chunk..."
          timeout 605 streamlink --hls-live-edge 3 --retry-streams 2 --retry-max 2 --stdout "$HLS" best 2>/tmp/sl_err.log | \
            timeout 605 ffmpeg -y -t 600 -i pipe:0 -c copy -movflags +faststart -f mp4 "$OUTFILE" 2>/dev/null || true
          SIZE=$(stat -c%s "$OUTFILE" 2>/dev/null || echo 0)
          echo "Chunk size: $SIZE bytes"

          if [ "$SIZE" -gt 1024 ] && [ -f "$OUTFILE" ]; then
            # Send to Telegram
            if curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendVideo" \
              -F "chat_id=${CHAT_ID}" \
              -F "video=@${OUTFILE}" \
              -F "supports_streaming=true" 2>/dev/null | grep -q '"ok":true'; then
              echo "Sent! ($SIZE bytes)"
            else
              echo "Send failed"
            fi
            rm -f "$OUTFILE"
          else
            echo "Chunk too small or missing"
            rm -f "$OUTFILE"
          fi

      - name: Self-dispatch if still live
        if: steps.rec.outputs.live == 'true'
        run: |
          # Quick recheck and self-dispatch to continue chain
          sleep 3
          DATA2=$(curl -s --max-time 8 "https://go.xxxiijmp.com/api/models?modelsList=JustKatrin&strict=1" 2>/dev/null || echo '{"count":0}')
          COUNT2=$(echo "$DATA2" | jq -r '.count // 0' 2>/dev/null)
          if [ "$COUNT2" != "0" ] && [ -n "$COUNT2" ]; then
            HLS2=$(echo "$DATA2" | jq -r '.models[0].stream.url // ""' 2>/dev/null)
            PLAYLIST2=$(curl -s --max-time 8 "$HLS2" 2>/dev/null || echo "")
            SEGS2=$(echo "$PLAYLIST2" | grep -c '#EXTINF' 2>/dev/null || echo 0)
            if [ "$SEGS2" -gt 0 ]; then
              echo "Still live, self-dispatching..."
              curl -s -X POST \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record-jk.yml/dispatches" \
                -d '{"ref":"main"}' 2>/dev/null
              echo "Self-dispatch sent"
            fi
          fi
