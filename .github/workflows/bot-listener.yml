name: Bot Listener (Fast)
on:
  workflow_dispatch:
  schedule:
    # every 5h45m (with 360-min timeout, this avoids overlap and keeps a fresh listener)
    - cron: '15 */6 * * *'

# Hard rule: at most ONE listener run alive at any time.
# New dispatches (or cron triggers) cancel the previous one.
concurrency:
  group: bot-listener
  cancel-in-progress: true

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPOSITORY: ${{ github.repository }}
  STATE_DIR: /tmp/recorder-state

permissions:
  contents: write

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y -qq jq curl python3 ffmpeg
      - run: mkdir -p /tmp/recorder-state
      - name: Long-polling
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Force unbuffered output so traces appear in real time
          export PYTHONUNBUFFERED=1
          exec 2>&1

          echo "[$(date -u +%H:%M:%S)] START listener boot"

          # STEP 1: always peek Telegram to find the current highest
          # update_id. This tells us what Telegram has in queue right now.
          PEEK=$(curl -s --max-time 10 "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?timeout=0" 2>/dev/null || echo '{"ok":false,"result":[]}')
          PEEK_ID=$(printf '%s' "$PEEK" | jq -r '[.result[].update_id] | (max // 0)' 2>/dev/null)
          LATEST=0
          if [ -n "$PEEK_ID" ] && [ "$PEEK_ID" -ge 0 ] 2>/dev/null; then
            LATEST="$PEEK_ID"
          fi
          echo "[$(date -u +%H:%M:%S)] Telegram latest update_id in queue: $LATEST"

          # STEP 2: read committed offset (preferred — survives restarts)
          OFFSET=0
          if [ -f ./listener_offset ]; then
            OFFSET=$(cat ./listener_offset 2>/dev/null | tr -d '[:space:]')
            [ -z "$OFFSET" ] && OFFSET=0
            echo "[$(date -u +%H:%M:%S)] committed offset: $OFFSET"
          fi

          # STEP 3: sanity-check the offset.
          # A) no offset / invalid → LATEST+1 (skip all backlog)
          # B) offset >> LATEST+100 (e.g. 9999999999 "skip" sentinel or
          #    stale from old run) → reset to LATEST+1 so new msgs flow
          # C) offset in (0, LATEST+1] → keep it (normal continuation)
          SANE_MAX=$((LATEST + 1))
          if [ "${OFFSET:-0}" = "0" ] || ! [ "${OFFSET:-0}" -ge 0 ] 2>/dev/null; then
            OFFSET=$SANE_MAX
            echo "[$(date -u +%H:%M:%S)] no valid saved offset → OFFSET=$OFFSET (skip backlog)"
          elif [ "${OFFSET:-0}" -gt $((SANE_MAX + 100)) ] 2>/dev/null; then
            OLD=$OFFSET
            OFFSET=$SANE_MAX
            echo "[$(date -u +%H:%M:%S)] saved offset $OLD is > LATEST+100 (sentinel/stale) → reset OFFSET=$OFFSET"
          else
            echo "[$(date -u +%H:%M:%S)] using saved offset: $OFFSET"
          fi
          echo "[$(date -u +%H:%M:%S)] final offset=$OFFSET (LATEST=$LATEST)"
          # Persist immediately so a crash here still saves state
          mkdir -p /tmp/recorder-state
          echo "$OFFSET" > /tmp/recorder-state/listener_offset
          echo "$OFFSET" > ./listener_offset

          # 6h budget = 21600s; we use 21500s to leave cleanup time
          END=$(( $(date +%s) + 21500 ))
          echo "[$(date -u +%H:%M:%S)] end=$END"

          ITER=0
          # ---- Model monitor tick (every MONITOR_TICK iterations ≈ 5 min) ----
          MONITOR_TICK=12        # 12 × 25s = 5 min
          LAST_MONITOR=0
          CHECK_STATE_FILE=/tmp/recorder-state/check_state.json
          while [ "$(date +%s)" -lt "$END" ]; do
            ITER=$((ITER + 1))
            # ---- monitor tick: detect online/offline transitions ----
            if [ $((ITER % MONITOR_TICK)) -eq 1 ] || [ "$ITER" = "1" ]; then
              NOW_TS=$(date +%s)
              if [ $((NOW_TS - LAST_MONITOR)) -ge 280 ]; then
                LAST_MONITOR=$NOW_TS
                echo "[$(date -u +%H:%M:%S)] MONITOR tick"
                # Load previous state (cross-runner) from 'state' branch
                PREV_STATE='{"JustKatrin":"offline","moonmaiden":"offline","Maddy_May":"offline"}'
                if timeout 5 bash ./state-fetch.sh check_state.json "$CHECK_STATE_FILE" >/dev/null 2>&1 && [ -s "$CHECK_STATE_FILE" ]; then
                  PREV_STATE=$(cat "$CHECK_STATE_FILE")
                fi
                PREV_JK=$(echo "$PREV_STATE" | jq -r '.JustKatrin // "offline"' 2>/dev/null)
                # Query current JustKatrin status
                JK_DATA=$(curl -s --max-time 8 "https://go.xxxiijmp.com/api/models?modelsList=JustKatrin&strict=1" 2>/dev/null || echo "")
                CUR_JK="offline"
                JK_URL=""
                if [ -n "$JK_DATA" ]; then
                  ONLINE=$(echo "$JK_DATA" | jq -r 'if (.count // 0) > 0 and .models[0].stream.url != null then "online" else "offline" end' 2>/dev/null)
                  CUR_JK="$ONLINE"
                  JK_URL=$(echo "$JK_DATA" | jq -r '.models[0].stream.url // ""' 2>/dev/null)
                fi
                VIEWERS=$(echo "$JK_DATA" | jq -r '.models[0].viewersCount // 0' 2>/dev/null)
                echo "[$(date -u +%H:%M:%S)]   JustKatrin: prev=$PREV_JK cur=$CUR_JK viewers=$VIEWERS"
                # Transition offline -> online
                if [ "$CUR_JK" = "online" ] && [ "$PREV_JK" != "online" ]; then
                  echo "[$(date -u +%H:%M:%S)]   TRANSITION offline->online — notify + dispatch record"
                  # Extract a fresh preview from HLS
                  PREVIEW_FILE=/tmp/recorder-state/preview_JustKatrin.jpg
                  rm -f "$PREVIEW_FILE"
                  if [ -n "$JK_URL" ]; then
                    timeout 20 ffmpeg -y -i "$JK_URL" -frames:v 1 -q:v 3 -ss 2 -vf "scale=480:-1" "$PREVIEW_FILE" 2>/dev/null || true
                    if [ -s "$PREVIEW_FILE" ]; then
                      cp -f "$PREVIEW_FILE" /tmp/recorder-state/last_frame.jpg
                      bash ./state-store.sh "$PREVIEW_FILE" "last_frame.jpg" "preview update" >/dev/null 2>&1 || true
                      curl -s --max-time 15 "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" \
                        -F "chat_id=${CHAT_ID}" -F "photo=@${PREVIEW_FILE}" \
                        -F "caption=🟢 JustKatrin online (${VIEWERS} зр.)" 2>/dev/null >/dev/null || true
                    else
                      curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                        -d "chat_id=${CHAT_ID}" --data-urlencode "text=🟢 JustKatrin online (${VIEWERS} зр.)" 2>/dev/null >/dev/null
                    fi
                  fi
                  # Dispatch record
                  if [ -n "$JK_URL" ] && [ -n "${GITHUB_TOKEN:-}" ]; then
                    PAYLOAD=$(jq -n --arg m "JustKatrin" --arg p "stripchat" --arg h "$JK_URL" --arg r "main" \
                      '{ref:$r, inputs:{model:$m, provider:$p, hls_url:$h}}')
                    curl -s -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/dispatches" \
                      -d "$PAYLOAD" 2>/dev/null >/dev/null && echo "  record dispatched"
                  fi
                fi
                # Transition online -> offline
                if [ "$CUR_JK" = "offline" ] && [ "$PREV_JK" = "online" ]; then
                  echo "[$(date -u +%H:%M:%S)]   TRANSITION online->offline"
                  curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                    -d "chat_id=${CHAT_ID}" --data-urlencode "text=🔴 JustKatrin offline" 2>/dev/null >/dev/null
                fi
                # Persist state
                NEW_STATE=$(echo "$PREV_STATE" | jq -c --arg jk "$CUR_JK" '.JustKatrin = $jk' 2>/dev/null || echo "$PREV_STATE")
                echo "$NEW_STATE" > "$CHECK_STATE_FILE"
                bash ./state-store.sh "$CHECK_STATE_FILE" "check_state.json" "check state" >/dev/null 2>&1 || true

                # --- moonmaiden (BongaCams) check ---
                PREV_MN=$(echo "$NEW_STATE" | jq -r '.moonmaiden // "offline"' 2>/dev/null)
                MN_RESP=$(curl -s --max-time 15 -X POST 'https://bongacams.com/tools/amf.php?x-country=en' \
                    -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' \
                    -H 'Origin: https://bongacams.com' \
                    -H 'Referer: https://bongacams.com/' \
                    -H 'X-Requested-With: XMLHttpRequest' \
                    -d 'method=getRoomData&args[]=moonmaiden&args[]=false' 2>/dev/null || echo "")
                CUR_MN="offline"
                MN_HLS=""
                MN_VIEWERS=0
                if echo "$MN_RESP" | grep -q '"isOnline":true\|"isOnline": true'; then
                  CUR_MN="online"
                  # BongaCams uses WebRTC now — get real HLS URL from mybro.tv API
                  MN_HLS=$(curl -s --max-time 8 'https://mybro.tv/api/v1/models/alias/moonmaiden_' \
                    -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' 2>/dev/null | \
                    python3 -c 'import sys,json
try:
    d=json.loads(sys.stdin.read())
    print((d.get("model") or {}).get("streamUrl") or "")
except Exception: pass' 2>/dev/null)
                  MN_VIEWERS=$(echo "$MN_RESP" | python3 -c 'import sys,json
try:
    d=json.loads(sys.stdin.read())
    v=(d.get("performerData") or {}).get("viewersCount") or 0
    print(int(v))
except Exception: pass' 2>/dev/null)
                fi
                echo "[$(date -u +%H:%M:%S)]   moonmaiden: prev=$PREV_MN cur=$CUR_MN viewers=$MN_VIEWERS"

                if [ "$CUR_MN" = "online" ] && [ "$PREV_MN" != "online" ]; then
                  echo "[$(date -u +%H:%M:%S)]   moonmaiden TRANSITION offline->online"
                  if [ -n "$MN_HLS" ]; then
                    PREVIEW_FILE_MN=/tmp/recorder-state/preview_moonmaiden.jpg
                    rm -f "$PREVIEW_FILE_MN"
                    timeout 20 ffmpeg -y -i "$MN_HLS" -frames:v 1 -q:v 3 -ss 2 -vf "scale=480:-1" "$PREVIEW_FILE_MN" 2>/dev/null || true
                    if [ -s "$PREVIEW_FILE_MN" ]; then
                      cp -f "$PREVIEW_FILE_MN" /tmp/recorder-state/last_frame.jpg
                      bash ./state-store.sh "$PREVIEW_FILE_MN" "last_frame.jpg" "preview update" >/dev/null 2>&1 || true
                      curl -s --max-time 15 "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" \
                        -F "chat_id=${CHAT_ID}" -F "photo=@${PREVIEW_FILE_MN}" \
                        -F "caption=🟢 moonmaiden online (${MN_VIEWERS} зр.)" 2>/dev/null >/dev/null || true
                    else
                      curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                        -d "chat_id=${CHAT_ID}" --data-urlencode "text=🟢 moonmaiden online (${MN_VIEWERS} зр.)" 2>/dev/null >/dev/null
                    fi
                  else
                    curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                      -d "chat_id=${CHAT_ID}" --data-urlencode "text=🟢 moonmaiden online (${MN_VIEWERS} зр.)" 2>/dev/null >/dev/null
                  fi
                  # Dispatch record
                  if [ -n "$MN_HLS" ] && [ -n "${GITHUB_TOKEN:-}" ]; then
                    PAYLOAD_MN=$(jq -n --arg m "moonmaiden" --arg p "bongacams" --arg h "$MN_HLS" --arg r "main" \
                      '{ref:$r, inputs:{model:$m, provider:$p, hls_url:$h}}')
                    curl -s -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/dispatches" \
                      -d "$PAYLOAD_MN" 2>/dev/null >/dev/null && echo "  record dispatched"
                  fi
                fi
                if [ "$CUR_MN" = "offline" ] && [ "$PREV_MN" = "online" ]; then
                  echo "[$(date -u +%H:%M:%S)]   moonmaiden TRANSITION online->offline"
                  curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                    -d "chat_id=${CHAT_ID}" --data-urlencode "text=🔴 moonmaiden offline" 2>/dev/null >/dev/null
                fi

                # Persist state (merged with moonmaiden)
                NEW_STATE=$(echo "$NEW_STATE" | jq -c --arg mn "$CUR_MN" '.moonmaiden = $mn' 2>/dev/null || echo "$NEW_STATE")
                echo "$NEW_STATE" > "$CHECK_STATE_FILE"
                bash ./state-store.sh "$CHECK_STATE_FILE" "check_state.json" "check state" >/dev/null 2>&1 || true

                # --- Maddy_May (MFC) check ---
                PREV_MM=$(echo "$NEW_STATE" | jq -r '.Maddy_May // "offline"' 2>/dev/null)
                MM_RESULT=$(python3 ./check-mfc.py 34721990 2>/dev/null || echo "offline")
                CUR_MM=$(echo "$MM_RESULT" | cut -d'|' -f1)
                MM_URL=$(echo "$MM_RESULT" | cut -d'|' -f2)
                [ -z "$CUR_MM" ] && CUR_MM="offline"
                echo "[$(date -u +%H:%M:%S)]   Maddy_May: prev=$PREV_MM cur=$CUR_MM"

                if [ "$CUR_MM" = "online" ] && [ "$PREV_MM" != "online" ]; then
                  echo "[$(date -u +%H:%M:%S)]   Maddy_May TRANSITION offline->online"
                  if [ -n "$MM_URL" ]; then
                    PREVIEW_FILE_MM=/tmp/recorder-state/preview_Maddy_May.jpg
                    rm -f "$PREVIEW_FILE_MM"
                    timeout 20 ffmpeg -y -i "$MM_URL" -frames:v 1 -q:v 3 -ss 2 -vf "scale=480:-1" "$PREVIEW_FILE_MM" 2>/dev/null || true
                    if [ -s "$PREVIEW_FILE_MM" ]; then
                      cp -f "$PREVIEW_FILE_MM" /tmp/recorder-state/last_frame.jpg
                      bash ./state-store.sh "$PREVIEW_FILE_MM" "last_frame.jpg" "preview update" >/dev/null 2>&1 || true
                      curl -s --max-time 15 "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" \
                        -F "chat_id=${CHAT_ID}" -F "photo=@${PREVIEW_FILE_MM}" \
                        -F "caption=🟢 Maddy_May online (MFC)" 2>/dev/null >/dev/null || true
                    else
                      curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                        -d "chat_id=${CHAT_ID}" --data-urlencode "text=🟢 Maddy_May online (MFC)" 2>/dev/null >/dev/null
                    fi
                  else
                    curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                      -d "chat_id=${CHAT_ID}" --data-urlencode "text=🟢 Maddy_May online (MFC)" 2>/dev/null >/dev/null
                  fi
                  # Dispatch record
                  if [ -n "$MM_URL" ] && [ -n "${GITHUB_TOKEN:-}" ]; then
                    PAYLOAD_MM=$(jq -n --arg m "Maddy_May" --arg p "myfreecams" --arg h "$MM_URL" --arg r "main" \
                      '{ref:$r, inputs:{model:$m, provider:$p, hls_url:$h}}')
                    curl -s -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/dispatches" \
                      -d "$PAYLOAD_MM" 2>/dev/null >/dev/null && echo "  record dispatched"
                  fi
                fi
                if [ "$CUR_MM" = "offline" ] && [ "$PREV_MM" = "online" ]; then
                  echo "[$(date -u +%H:%M:%S)]   Maddy_May TRANSITION online->offline"
                  curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                    -d "chat_id=${CHAT_ID}" --data-urlencode "text=🔴 Maddy_May offline" 2>/dev/null >/dev/null
                fi

                # Persist state (merged with Maddy_May)
                NEW_STATE=$(echo "$NEW_STATE" | jq -c --arg mm "$CUR_MM" '.Maddy_May = $mm' 2>/dev/null || echo "$NEW_STATE")
                echo "$NEW_STATE" > "$CHECK_STATE_FILE"
                bash ./state-store.sh "$CHECK_STATE_FILE" "check_state.json" "check state" >/dev/null 2>&1 || true
              fi
            fi
            # Long-poll for up to 25s
            RAW=$(curl -s --max-time 30 "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${OFFSET}&timeout=25" 2>/dev/null || echo '{"ok":false,"result":[]}')

            # Parse count defensively
            COUNT=$(printf '%s' "$RAW" | jq -r '.result | length' 2>/dev/null)
            if [ -z "$COUNT" ] || ! [ "$COUNT" -ge 0 ] 2>/dev/null; then
              COUNT=0
            fi

            # Log every 30 iterations to prove loop is alive
            if [ $((ITER % 30)) -eq 1 ]; then
              echo "[$(date -u +%H:%M:%S)] iter=$ITER offset=$OFFSET count=$COUNT"
            fi

            if [ "$COUNT" -gt 0 ] 2>/dev/null; then
              echo "[$(date -u +%H:%M:%S)] iter=$ITER GOT $COUNT updates"
              # CRITICAL: use process substitution <(...) so the while loop
              # runs in THIS shell. With a pipe |, the while runs in a
              # subshell and OFFSET changes never propagate -> infinite
              # re-fetching of the same updates -> 400+ messages in 5 min.
              while IFS= read -r upd; do
                uid=$(printf '%s' "$upd" | jq -r '.update_id' 2>/dev/null)
                chat=$(printf '%s' "$upd" | jq -r '.message.chat.id // ""' 2>/dev/null)
                text=$(printf '%s' "$upd" | jq -r '.message.text // ""' 2>/dev/null)
                [ -z "$chat" ] && continue
                [ "$chat" != "$CHAT_ID" ] && { echo "[$(date -u +%H:%M:%S)] skip chat=$chat"; OFFSET=$((uid + 1)); continue; }
                tl=$(printf '%s' "$text" | tr '[:upper:]' '[:lower:]')
                echo "[$(date -u +%H:%M:%S)] cmd uid=$uid chat=$chat text='$tl'"

                # Try to fetch last frame from state branch (best-effort, 5s max)
                FRAME=/tmp/recorder-state/last_frame.jpg
                rm -f "$FRAME"
                timeout 5 bash ./state-fetch.sh last_frame.jpg "$FRAME" >/dev/null 2>&1 || true
                if [ -s "$FRAME" ]; then
                  FSIZE=$(stat -c%s "$FRAME" 2>/dev/null || echo 0)
                  echo "  frame: OK $FSIZE bytes"
                else
                  FRAME=""
                  echo "  frame: missing"
                fi

                # Extract first word (so '/status test' -> '/status')
                cmd=$(printf '%s' "$tl" | awk '{print $1}')
                # Strip bot username suffix from command (e.g. /status@Su4ki_bot -> /status)
                cmd=$(printf '%s' "$cmd" | sed 's/@.*//')
                echo "  parsed cmd='$cmd'"

                # Per-user debounce: ignore if last reply was < 2s ago
                DEBOUNCE_FILE=/tmp/recorder-state/last_reply_${chat}
                NOW=$(date +%s)
                LAST=0
                [ -f "$DEBOUNCE_FILE" ] && LAST=$(cat "$DEBOUNCE_FILE" 2>/dev/null || echo 0)
                DELTA=$(( NOW - LAST ))
                if [ "$DELTA" -lt 2 ] 2>/dev/null; then
                  echo "  debounce: $DELTA s < 2, skip reply"
                  OFFSET=$((uid + 1))
                  echo "$OFFSET" > /tmp/recorder-state/listener_offset
                  continue
                fi

                # Build response text + decide whether to attach a photo.
                # PHOTO=1 only for commands that benefit from a screenshot.
                PHOTO=0
                case "$cmd" in
                  /status|status)
                    jk_data=$(curl -s --max-time 5 "https://go.xxxiijmp.com/api/models?modelsList=JustKatrin&strict=1" 2>/dev/null || echo "")
                    # API does NOT have .stream.online — use .stream.url presence as online indicator
                    jk=$(printf '%s' "$jk_data" | jq -r '
                      if (.count // 0) > 0 and .models[0].stream.url != null then
                        "online (\(.models[0].viewersCount // 0))"
                      else "offline" end' 2>/dev/null)
                    [ -z "$jk" ] && jk="offline"
                    # MFC check (fast: 8s WSS connect + parse)
                    mm_result=$(timeout 10 python3 ./check-mfc.py 34721990 2>/dev/null || echo "offline")
                    mm_status=$(echo "$mm_result" | cut -d'|' -f1)
                    [ -z "$mm_status" ] && mm_status="offline"
                    # BongaCams check (inline, fast AMF call)
                    mn_resp=$(curl -s --max-time 10 -X POST 'https://bongacams.com/tools/amf.php?x-country=en' \
                      -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' \
                      -H 'Origin: https://bongacams.com' \
                      -H 'Referer: https://bongacams.com/' \
                      -H 'X-Requested-With: XMLHttpRequest' \
                      -d 'method=getRoomData&args[]=moonmaiden&args[]=false' 2>/dev/null || echo "")
                    mn="offline"
                    if echo "$mn_resp" | grep -q '"isOnline":true\|"isOnline": true'; then
                      mn_views=$(echo "$mn_resp" | python3 -c 'import sys,json
try:
    d=json.loads(sys.stdin.read())
    v=(d.get("performerData") or {}).get("viewersCount") or 0
    print(int(v))
except Exception: pass' 2>/dev/null || echo 0)
                      mn="online (${mn_views})"
                    fi
                    r="JustKatrin: $jk | moonmaiden: $mn | Maddy_May: $mm_status"
                    PHOTO=1
                    ;;
                  /models|models)
                    r="JustKatrin, moonmaiden, Maddy_May"
                    PHOTO=1
                    ;;
                  /last|last)
                    r="записей пока нет"
                    PHOTO=1
                    ;;
                  /help|help|/start|start)
                    r="/status /models /last /help"
                    # no photo for help
                    ;;
                  *)
                    r="неизвестная команда: $text"
                    # no photo for unknown -> big spam reduction
                    ;;
                esac
                echo "  send msg: $r (photo=$PHOTO)"
                curl -s --max-time 8 "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                  -d "chat_id=${chat}" --data-urlencode "text=${r}" 2>/dev/null >/dev/null || true

                if [ "$PHOTO" = "1" ] && [ -n "$FRAME" ] && [ -f "$FRAME" ] && [ -s "$FRAME" ]; then
                  echo "  send photo: $FRAME"
                  curl -s --max-time 15 "https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto" \
                    -F "chat_id=${chat}" -F "photo=@${FRAME}" \
                    -F "caption=последний кадр записи" 2>/dev/null >/dev/null || true
                fi

                # Update debounce timestamp for this chat
                echo "$NOW" > "$DEBOUNCE_FILE"

                # Advance offset (this now runs in the OUTER shell, not a subshell)
                OFFSET=$((uid + 1))
                echo "$OFFSET" > /tmp/recorder-state/listener_offset
                echo "$OFFSET" > ./listener_offset
                echo "[$(date -u +%H:%M:%S)] offset -> $OFFSET"
              done < <(printf '%s' "$RAW" | jq -c '.result[]' 2>/dev/null)
            fi
          done

          echo "[$(date -u +%H:%M:%S)] END listener (iter=$ITER)"
