name: Model Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  STATE_DIR: /tmp/recorder-state
  GITHUB_REPOSITORY: ${{ github.repository }}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-22.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq ffmpeg
          # streamlink: install via pip (most reliable across runner images)
          if ! command -v streamlink >/dev/null 2>&1; then
            pip3 install --quiet streamlink
          fi
          echo "streamlink=$(streamlink --version 2>&1 | head -1)"
          echo "ffmpeg=$(ffmpeg -version 2>&1 | head -1)"
      - name: Run monitor
        run: bash check-models.sh
