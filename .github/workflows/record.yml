name: Record Model Stream
on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to record'
        required: true
        type: string
      provider:
        description: 'Provider (stripchat/bongacams)'
        required: true
        type: string
      hls_url:
        description: 'HLS stream URL'
        required: true
        type: string
      max_duration:
        description: 'Max recording duration in seconds (default 20400 = 5h40m)'
        required: false
        default: '20400'
        type: string

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  STATE_DIR: /tmp/recorder-state
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPOSITORY: ${{ github.repository }}

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    concurrency:
      group: recording-${{ github.event.inputs.model }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl jq ffmpeg 2>/dev/null
          pip3 install --quiet --upgrade streamlink
          echo "streamlink=$(streamlink --version 2>&1 | head -1)"

      - name: Setup state
        run: mkdir -p $STATE_DIR

      - name: Record
        id: record
        timeout-minutes: 345
        run: |
          bash record-single.sh \
            "${{ github.event.inputs.model }}" \
            "${{ github.event.inputs.provider }}" \
            "${{ github.event.inputs.hls_url }}" \
            "${{ github.event.inputs.max_duration }}"

      - name: Self-dispatch (continue if still live)
        if: always()
        run: |
          MODEL="${{ github.event.inputs.model }}"
          PROVIDER="${{ github.event.inputs.provider }}"
          echo "Checking if ${MODEL} is still live..."
          
          if [ "$PROVIDER" = "stripchat" ]; then
            DATA=$(curl -s --max-time 8 "https://go.xxxiijmp.com/api/models?modelsList=${MODEL}&strict=1" 2>/dev/null || echo '{"count":0}')
            COUNT=$(echo "$DATA" | jq -r '.count // 0' 2>/dev/null)
            if [ "$COUNT" != "0" ] && [ -n "$COUNT" ]; then
              HLS=$(echo "$DATA" | jq -r '.models[0].stream.url // ""' 2>/dev/null)
              HLS_OK=$(curl -sI --max-time 10 "$HLS" 2>/dev/null | head -1 | grep -c '200\|302' || echo 0)
              if [ "$HLS_OK" != "0" ]; then
                echo "Still live! Re-dispatching..."
                curl -s -X POST \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/dispatches" \
                  -d "$(jq -n --arg m "$MODEL" --arg p "$PROVIDER" --arg h "$HLS" --arg r "main" \
                    '{ref:$r, inputs:{model:$m, provider:$p, hls_url:$h}}')" 2>/dev/null
                echo "Re-dispatched"
              fi
            fi
          fi
          echo "Self-dispatch check complete"
