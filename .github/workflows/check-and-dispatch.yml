name: Check Models & Dispatch Record
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq curl 2>/dev/null

      - name: Check JustKatrin (Stripchat)
        run: |
          echo "=== JustKatrin ==="
          DATA=$(curl -s --max-time 8 "https://go.xxxiijmp.com/api/models?modelsList=JustKatrin&strict=1" 2>/dev/null || echo '{"count":0}')
          COUNT=$(echo "$DATA" | jq -r '.count // 0' 2>/dev/null)
          if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
            echo "Not in public stream (count=$COUNT)"
            exit 0
          fi
          HLS=$(echo "$DATA" | jq -r '.models[0].stream.url // ""' 2>/dev/null)
          VIEWERS=$(echo "$DATA" | jq -r '.models[0].viewersCount // 0' 2>/dev/null)
          echo "LIVE! Viewers=$VIEWERS"

          # Validate HLS
          HLS_OK=$(curl -sI --max-time 10 "$HLS" 2>/dev/null | head -1 | grep -c '200\|302' || echo 0)
          if [ "$HLS_OK" = "0" ]; then
            echo "HLS unreachable, skip"
            exit 0
          fi
          echo "HLS OK"

          # Skip if any record run is already queued (prevents pile-up)
          QUEUED=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/runs?status=queued&per_page=5" 2>/dev/null | \
            jq -r '.total_count // 0' 2>/dev/null || echo 0)
          if [ "$QUEUED" -gt 0 ] 2>/dev/null; then
            echo "Record workflow has $QUEUED queued runs — skip (already dispatched)"
            exit 0
          fi

          # Dispatch record-jk.yml (simplified)
          echo "Dispatching record-jk for JustKatrin..."
          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record-jk.yml/dispatches" \
            -d '{"ref":"main"}' 2>/dev/null
          echo "Done"

          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=🟢 JustKatrin online (${VIEWERS} зр.)" 2>/dev/null >/dev/null || true

      - name: Check moonmaiden (BongaCams)
        run: |
          echo "=== moonmaiden ==="
          # v6.35: get HLS from mybro.tv, check if playlist has segments (isOnline is unreliable)
          MN_JSON=$(curl -s --max-time 8 'https://mybro.tv/api/v1/models/alias/moonmaiden_' \
            -H 'User-Agent: Mozilla/5.0' 2>/dev/null || echo '{}')
          MN_HLS=$(echo "$MN_JSON" | python3 -c 'import sys,json; d=json.load(sys.stdin); print((d.get("model") or {}).get("streamUrl") or "")' 2>/dev/null)
          if [ -z "$MN_HLS" ] || [ "$MN_HLS" = "None" ] || [ "$MN_HLS" = "" ]; then
            echo "No HLS URL"
            exit 0
          fi
          # Check if playlist has actual video segments (EXTINF lines), not just header
          MN_PLAYLIST=$(curl -s --max-time 8 "$MN_HLS" 2>/dev/null || echo "")
          MN_SEGMENTS=$(echo "$MN_PLAYLIST" | grep -c '#EXTINF' 2>/dev/null || echo 0)
          if [ "$MN_SEGMENTS" -eq 0 ]; then
            echo "HLS empty (no segments, stream not active)"
            exit 0
          fi
          echo "LIVE! ($MN_SEGMENTS segments in playlist)"
          QUEUED=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/runs?status=queued&per_page=5" 2>/dev/null | \
            jq -r '.total_count // 0' 2>/dev/null || echo 0)
          if [ "$QUEUED" -gt 0 ] 2>/dev/null; then
            echo "$QUEUED queued — skip"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/dispatches" \
            -d "$(jq -n --arg m "moonmaiden" --arg p "bongacams" --arg h "$MN_HLS" --arg r "main" \
              '{ref:$r, inputs:{model:$m, provider:$p, hls_url:$h}}')" 2>/dev/null
          echo "Done"
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=🟢 moonmaiden online" 2>/dev/null >/dev/null || true
      - name: Check Maddy_May (MFC)
        run: |
          echo "=== Maddy_May ==="
          RESULT=$(timeout 10 python3 ./check-mfc.py 34721990 2>/dev/null || echo "offline")
          CUR=$(echo "$RESULT" | cut -d'|' -f1)
          URL=$(echo "$RESULT" | cut -d'|' -f2)
          if [ "$CUR" != "online" ] || [ -z "$URL" ]; then
            echo "Offline or no URL"
            exit 0
          fi
          HLS_OK=$(curl -sI --max-time 10 "$URL" 2>/dev/null | head -1 | grep -c '200\|302' || echo 0)
          if [ "$HLS_OK" = "0" ]; then
            echo "HLS unreachable"
            exit 0
          fi
          QUEUED=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/runs?status=queued&per_page=5" 2>/dev/null | \
            jq -r '.total_count // 0' 2>/dev/null || echo 0)
          if [ "$QUEUED" -gt 0 ] 2>/dev/null; then
            echo "$QUEUED queued — skip"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/record.yml/dispatches" \
            -d "$(jq -n --arg m "Maddy_May" --arg p "myfreecams" --arg h "$URL" --arg r "main" \
              '{ref:$r, inputs:{model:$m, provider:$p, hls_url:$h}}')" 2>/dev/null
          echo "Done"
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=🟢 Maddy_May online (MFC)" 2>/dev/null >/dev/null || true
